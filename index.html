<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ceny Elektřiny - Chalupa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; padding-bottom: 50px; }
        h1 { text-align: center; color: #00e676; font-size: 1.5em; margin: 20px 0; }
        
        /* Horní karta s dynamickým časem */
        .stats { display: flex; justify-content: center; margin-bottom: 20px; }
        .card { 
            background: #1e1e1e; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: center; 
            width: 100%; 
            max-width: 300px; 
            border: 2px solid #00e676;
            box-shadow: 0 4px 15px rgba(0, 230, 118, 0.2);
        }
        .card h3 { 
            margin: 0; 
            color: #00e676; 
            font-size: 0.9em; 
            text-transform: uppercase; 
            letter-spacing: 2px;
        }
        .card p { font-size: 2.2em; font-weight: bold; margin: 10px 0 0 0; color: #fff; }

        /* Graf: Na PC 40vh, na mobilu 70vh */
        .chart-container {
            position: relative;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 30px;
            border: 1px solid #333;
            height: 40vh;
        }

        @media (max-width: 600px) {
            .chart-container { height: 70vh; }
        }

        /* Tabulka */
        h2 { color: #00e676; font-size: 1.2em; margin-top: 30px; }
        .table-wrapper { border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        th { background: #252525; color: #00e676; font-weight: bold; }
        .current-row { background: rgba(0, 230, 118, 0.2); font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Ceny Elektřiny - Chalupa</h1>
        
        <div class="stats">
            <div class="card">
                <h3 id="time-label">ČAS --:--</h3>
                <p id="curr">-</p>
            </div>
        </div>

        <div class="chart-container">
            <canvas id="priceChart"></canvas>
        </div>

        <h2>Předpověď (Konečná cena)</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Čas</th>
                        <th>Cena [EUR/MWh]</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        let myChart = null;

        function nactiData() {
            // Přidání časového razítka za URL vynutí stažení nové verze (obejití cache)
            const csvUrl = './ceny_final_5min.csv?v=' + new Date().getTime();

            Papa.parse(csvUrl, {
                download: true,
                header: true,
                delimiter: ";",
                complete: function(results) {
                    const now = new Date();
                    const allData = results.data.filter(r => r.Datum && r.Cas);
                    
                    // Filtrace: zobrazit data od teď dál (-5 min rezerva)
                    const filteredData = allData.filter(r => {
                        const rowTime = new Date(`${r.Datum}T${r.Cas}`);
                        return rowTime >= new Date(now.getTime() - 5 * 60000);
                    });

                    if (filteredData.length === 0) return;

                    const labels = filteredData.map(r => r.Cas);
                    const konecna = filteredData.map(r => parseFloat(r.Cena_Konecna.replace(',', '.')));

                    // 1. Aktualizace horní karty (Čas platnosti a Cena)
                    document.getElementById('time-label').innerText = "PLATNOST " + filteredData[0].Cas;
                    document.getElementById('curr').innerText = konecna[0].toFixed(2) + " €";

                    // 2. Aktualizace tabulky
                    const tableBody = document.getElementById('tableBody');
                    tableBody.innerHTML = ""; // Vyčistit tabulku před překreslením
                    
                    filteredData.forEach((r, index) => {
                        const row = document.createElement('tr');
                        if (index === 0) row.className = 'current-row';
                        row.innerHTML = `<td>${r.Cas}</td><td>${konecna[index].toFixed(2)} €</td>`;
                        tableBody.appendChild(row);
                    });

                    // 3. Vykreslení nebo aktualizace grafu
                    const ctx = document.getElementById('priceChart').getContext('2d');
                    
                    if (myChart) {
                        myChart.destroy(); // Zničíme starý graf před novým vykreslením
                    }

                    myChart = new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: labels,
                            datasets: [{
                                label: 'Konečná cena',
                                data: konecna,
                                borderColor: '#00e676',
                                backgroundColor: 'rgba(0, 230, 118, 0.1)',
                                borderWidth: 3,
                                pointRadius: 0,
                                tension: 0.1,
                                fill: true
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { intersect: false, mode: 'index' },
                            scales: { 
                                x: { 
                                    grid: { display: false },
                                    ticks: { color: '#888', autoSkip: true, maxTicksLimit: 12 }
                                }, 
                                y: { 
                                    grid: { color: '#333' },
                                    ticks: { color: '#888' }
                                } 
                            },
                            plugins: { 
                                legend: { display: false } 
                            }
                        }
                    });
                    console.log("Aktualizováno: " + new Date().toLocaleTimeString());
                }
            });
        }

        // První spuštění
        nactiData();

        // Automatické obnovení každých 5 minut (300 000 ms)
        setInterval(nactiData, 300000);
    </script>
</body>
</html>
