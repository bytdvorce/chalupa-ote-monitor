<!DOCTYPE html>
<html lang="cs">
<head>

    <title>Ceny Elektřiny - Chalupa</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 10px; margin: 0; }
        .container { max-width: 800px; margin: auto; padding-bottom: 50px; }
        h1 { text-align: center; color: #00e676; font-size: 1.5em; margin: 20px 0; }
        
        /* Horní karta - jen jedna velká */
        .stats { display: flex; justify-content: center; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 12px; text-align: center; width: 100%; max-width: 300px; border: 2px solid #00e676; }
        .card h3 { margin: 0; color: #aaa; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        .card p { font-size: 2em; font-weight: bold; margin: 10px 0 0 0; color: #fff; }

        /* Kontejner pro graf */
        .chart-container {
            position: relative;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 30px;
            border: 1px solid #333;
            height: 40vh;
        }

        @media (max-width: 600px) {
            .chart-container { height: 60vh; }
        }

        /* Tabulka */
        h2 { color: #00e676; font-size: 1.2em; margin-top: 30px; }
        .table-wrapper { border-radius: 8px; border: 1px solid #333; overflow: hidden; }
        table { width: 100%; border-collapse: collapse; background: #1e1e1e; }
        th, td { padding: 15px; text-align: center; border-bottom: 1px solid #333; }
        th { background: #252525; color: #00e676; font-weight: bold; }
        .current-row { background: rgba(0, 230, 118, 0.2); font-weight: bold; }
    </style>
</head>
